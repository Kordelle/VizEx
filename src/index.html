<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Free online regex tester and visualizer. Paste text, write a regex, and instantly see colour-coded matches, capture groups, substitution output and live DQ rule validation. No signup required." />
    <meta name="keywords" content="regex tester, regex visualizer, online regex, regular expression tester, regex debugger, data quality, DQ rules, regex highlighter" />
    <meta property="og:title" content="VizEx — Free Online Regex Tester & Visualizer" />
    <meta property="og:description" content="Free online regex tester and visualizer. Paste text, write a regex, and instantly see colour-coded matches, capture groups, substitution output and live DQ rule validation." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://vizex.app/" />
    <title>VizEx — Free Online Regex Tester & Visualizer</title>
    <link rel="canonical" href="https://vizex.app/" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "VizEx",
      "url": "https://vizex.app/",
      "description": "Free online regex tester and visualizer. Paste text, write a regex, and instantly see colour-coded matches, capture groups, substitution output and live DQ rule validation.",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Any",
      "browserRequirements": "Requires JavaScript",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Live regex match highlighting",
        "Capture group visualisation",
        "Substitution preview",
        "Data quality rule evaluation",
        "Match navigation",
        "Permalink sharing",
        "Dark mode"
      ]
    }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/styles/palette.css" />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>

    <!-- ── Global App Header ─────────────────────────────────────────── -->
    <header id="app-header" role="banner">
      <div class="app-header-brand">
        <span class="app-header-logo" aria-hidden="true">⬡</span>
        <span class="app-header-name">VizEx</span>
        <span class="app-header-tagline">Regex Data Quality Visualizer</span>
      </div>
      <div class="app-header-actions">
        <button id="btn-export" title="Download the data pane contents as a .txt file" aria-label="Export data pane as text file">↓ Export</button>
        <a id="btn-github" class="header-link" href="https://github.com/Kordelle/VizEx" target="_blank" rel="noopener noreferrer" title="View source and star VizEx on GitHub" aria-label="Star VizEx on GitHub">⭐ GitHub</a>
        <a id="btn-issues" class="header-link" href="https://github.com/Kordelle/VizEx/issues/new" target="_blank" rel="noopener noreferrer" title="Report a bug or request a feature on GitHub Issues" aria-label="Report an issue on GitHub">🐛 Issues</a>
        <button id="theme-toggle" title="Toggle between light and dark colour schemes" aria-label="Toggle dark mode">🌙 Dark</button>
      </div>
    </header>

    <div id="app">
      <!-- LEFT COLUMN: regex pane (top) + data pane (bottom) -->
      <div id="left-column">

        <!-- TOP PANE: RegexInputPanel -->
        <section id="regex-pane" aria-label="Regex pattern input">
          <div class="regex-input-row">
            <input
              id="pattern-input"
              type="text"
              placeholder="Enter regex pattern…"
              spellcheck="false"
              autocomplete="off"
              aria-label="Regex pattern"
            />
            <div class="flag-toggles" role="group" aria-label="Regex flags">
              <button class="flag-btn" data-flag="i" aria-pressed="false" title="Case-insensitive (i)">i</button>
              <button class="flag-btn" data-flag="m" aria-pressed="false" title="Multiline (m)">m</button>
              <button class="flag-btn" data-flag="s" aria-pressed="false" title="Dot-all (s)">s</button>
              <button class="flag-btn" data-flag="u" aria-pressed="false" title="Unicode (u)">u</button>
            </div>
          </div>
          <div class="pattern-error" id="pattern-error" role="alert" aria-live="polite"></div>
          <!-- Quick Reference cheat sheet -->
          <div id="regex-quick-ref"></div>
        </section>

        <!-- BOTTOM PANE: DataPane -->
        <section id="data-pane" aria-label="Raw data input">
          <div class="data-pane-toolbar">
            <span id="no-matches-indicator" aria-live="polite"></span>
            <span id="match-count" aria-live="polite"></span>
            <span class="toolbar-spacer"></span>
            <span id="cursor-pos" aria-label="Cursor position" title="Cursor line and column">Ln 1, Col 1</span>
            <span id="timing-readout" aria-label="Evaluation time"></span>
            <div class="toolbar-divider"></div>
            <button id="btn-match-prev" class="btn-toolbar" title="Jump to previous match" aria-label="Previous match" disabled>‹ Prev</button>
            <button id="btn-match-next" class="btn-toolbar" title="Jump to next match" aria-label="Next match" disabled>Next ›</button>
            <div class="toolbar-divider"></div>
            <label id="btn-upload" class="btn-toolbar" title="Upload a text file (.txt, .csv, .log, .json)" aria-label="Upload file">
              ↑ Upload
              <input type="file" id="file-upload" accept=".txt,.csv,.log,.json,.tsv,.md" aria-hidden="true" tabindex="-1" />
            </label>
            <button id="btn-clear" class="btn-toolbar btn-toolbar-danger" title="Clear all input" aria-label="Clear input">✕ Clear</button>
          </div>
          <div class="truncation-warning" id="truncation-warning" hidden></div>
          <div class="data-editor-wrap">
            <div class="highlight-layer" id="highlight-layer" aria-hidden="true"></div>
            <div
              id="raw-input"
              contenteditable="plaintext-only"
              role="textbox"
              aria-multiline="true"
              aria-label="Raw data input"
              spellcheck="false"
              autocorrect="off"
              autocapitalize="off"
              data-placeholder="Paste raw data here (log line, CSV row, JSON fragment…)"
            ></div>
          </div>
        </section>

        <!-- SUBSTITUTION PANE: SubstitutionPanel -->
        <section id="sub-pane" aria-label="Substitution">
          <div class="sub-pane-toolbar">
            <span class="sub-pane-label">Substitution</span>
            <span class="toolbar-spacer"></span>
            <button id="btn-sub-copy" class="btn-toolbar" title="Copy substituted output to clipboard" aria-label="Copy output">⎘ Copy</button>
          </div>
          <div class="sub-input-row">
            <input
              id="sub-input"
              type="text"
              placeholder="Replacement string… ($& full match, $1 group 1, $` before, $' after)"
              spellcheck="false"
              autocomplete="off"
              aria-label="Replacement string"
            />
          </div>
          <div id="sub-output" class="sub-output" aria-label="Substitution output" aria-live="polite"></div>
        </section>

      </div><!-- /left-column -->

      <!-- RIGHT SIDEBAR: DQRulesPanel -->
      <aside id="dq-panel" aria-label="Data quality rules">
        <div class="dq-panel-header">
          <span>DQ Rules</span>
          <span id="rule-count" aria-live="polite"></span>
        </div>

        <div class="dq-panel-body">

          <div class="dq-rules-list" id="dq-rules-list" role="list" aria-label="Defined DQ rules">
            <!-- Rule items injected by DQRulesPanel.ts -->
          </div>

          <!-- Add Rule Form -->
          <form class="add-rule-form" id="add-rule-form" aria-label="Add new DQ rule">
            <input type="text" id="rule-name" placeholder="Rule name" maxlength="100" required aria-label="Rule name" />
            <input type="text" id="rule-pattern" placeholder="Regex pattern" spellcheck="false" aria-label="Rule pattern" />
            <div class="form-row">
              <select id="rule-condition" aria-label="Match condition">
                <option value="must-match">Must match</option>
                <option value="must-not-match">Must not match</option>
                <option value="match-count-equals">Match count equals</option>
              </select>
              <input type="number" id="rule-expected-count" placeholder="N" min="0" aria-label="Expected count" style="width:60px;display:none" />
            </div>
            <button type="submit" class="btn-primary">+ Add Rule</button>
          </form>

          <!-- Example Patterns Panel -->
          <div id="examples-panel"></div>

          <!-- Match Details Panel -->
          <div id="match-details-panel" aria-label="Match details" aria-live="polite"></div>

          <!-- Input Statistics Panel -->
          <div id="input-stats-panel"></div>

        </div><!-- /dq-panel-body -->

      </aside><!-- /dq-panel -->
    </div><!-- /app -->

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
